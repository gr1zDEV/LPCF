features:
  enabled: false

webhooks:
  default: ""
  public-chat: ""
  private-messages: ""
  mail: ""
  mute-actions: ""
  audit-actions: ""
  server-broadcasts: ""
  death-messages: ""
  join-messages: ""
  leave-messages: ""

webhook:
  use-embeds: true

identity:
  username-mode: "minecraft-name"
  static-username: "EzChat"
  avatar-mode: "minecraft-head"
  static-avatar-url: ""

avatar:
  provider: "crafatar"
  custom-url: ""

events:
  public-chat: true
  private-messages: false
  mail: false
  mute-actions: true
  audit-actions: true
  server-broadcasts: false
  death-messages: false
  join-messages: false
  leave-messages: false

format:
  public-chat: "{player}: {message}"
  private-message: "[MSG] {sender} -> {receiver}: {message}"
  mail: "[MAIL] {sender} -> {receiver}: {message}"
  mute-action: "[MUTE] {actor} muted {target}"
  temp-mute-action: "[TEMP-MUTE] {actor} temp-muted {target} for {duration}"
  audit-action: "[AUDIT] {actor}: {details}"
  server-broadcast-console: "[BROADCAST] [Console] {message}"
  server-broadcast-player: "[BROADCAST] [{sender}] {message}"
  death-message: "[DEATH] {player}: {message}"
  join-message: "[JOIN] {player}: {message}"
  leave-message: "[LEAVE] {player}: {message}"

messages:
  feature-disabled: "&cDiscord webhook support is disabled."
  webhook-missing: "&cDiscord webhook URL is not configured."
