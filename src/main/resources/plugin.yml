name: EzChat
version: 1.0.0
main: com.ezinnovations.ezchat.EzChat
author: ezinnovations
description: Lightweight chat formatter with chat toggle support
api-version: 1.21
folia-supported: true
depend: [LuckPerms]
softdepend: [PlaceholderAPI, floodgate, Geyser-Spigot]
commands:
  ezchat:
    description: EzChat commands.
    usage: "Usage: /ezchat <reload|clear|debug>"
  togglechat:
    description: Toggle receiving public chat.
    usage: "Usage: /togglechat"
    aliases: [chattoggle]
  msg:
    description: Send a private message to a player.
    usage: "Usage: /msg <player> <message>"
  reply:
    description: Reply to your last private message target.
    usage: "Usage: /reply <message>"
  togglemsg:
    description: Toggle receiving private messages.
    usage: "Usage: /togglemsg"
    aliases: [msgtoggle]
  ignore:
    description: Ignore players
    usage: "Usage: /ignore <player> <ALL|CHAT|MSG>"
    permission: ezchat.ignore
permissions:
  ezchat.reload:
    description: Allows use of /ezchat reload
    default: op
  ezchat.clearchat:
    description: Allows use of /ezchat clear
    default: op
  ezchat.debug:
    description: Allows use of /ezchat debug
    default: op
  ezchat.colorcodes:
    description: Allows color codes in chat messages
    default: false
  ezchat.rgbcodes:
    description: Allows RGB/hex color codes in chat messages
    default: false
  ezchat.chattoggle:
    description: Allows use of /togglechat
    default: true
  ezchat.msg:
    description: Allows use of /msg
    default: true
  ezchat.reply:
    description: Allows use of /reply
    default: true
  ezchat.togglemsg:
    description: Allows use of /togglemsg
    default: true
  ezchat.ignore:
    description: Allows use of /ignore
    default: true
