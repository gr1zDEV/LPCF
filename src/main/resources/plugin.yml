name: EzChat
version: 1.0.0
main: com.ezinnovations.ezchat.EzChat
author: ezinnovations
description: Lightweight chat formatter with chat toggle support
api-version: 1.21
folia-supported: true
depend: [LuckPerms]
softdepend: [PlaceholderAPI, floodgate, Geyser-Spigot]
commands:
  ezchat:
    description: EzChat commands.
    usage: "Usage: /ezchat <reload|clear|debug|logs|mute|mutetemp|staffalert|broadcast>"
  togglechat:
    description: Toggle receiving public chat.
    usage: "Usage: /togglechat [on|off]"
  msg:
    description: Send a private message to a player.
    usage: "Usage: /msg <player> <message>"
  reply:
    description: Reply to your last private message target.
    usage: "Usage: /reply <message>"
  togglemsg:
    description: Toggle receiving private messages.
    usage: "Usage: /togglemsg [on|off]"
  ignore:
    description: Ignore players
    usage: "Usage: /ignore <player> <ALL|CHAT|MSG|MAIL>"
    permission: ezchat.ignore
  mail:
    description: Persistent in-game mail system
    usage: "Usage: /mail <player> <message>"
    permission: ezchat.mail
  togglemail:
    description: Toggle receiving mail
    usage: "Usage: /togglemail [on|off]"
    permission: ezchat.togglemail
  toggleservermsg:
    description: Toggle receiving server broadcast messages.
    usage: "Usage: /toggleservermsg [on|off]"
    permission: ezchat.servermsg.toggle
  toggledeathmsg:
    description: Toggle receiving death messages.
    usage: "Usage: /toggledeathmsg [on|off]"
    permission: ezchat.deathmsg.toggle
  staffchat:
    description: Send a staff chat message.
    usage: "Usage: /staffchat <message>"
    permission: ezchat.staffchat
  sc:
    description: Alias of /staffchat.
    usage: "Usage: /sc <message>"
    permission: ezchat.staffchat
  togglestaffchat:
    description: Toggle staff chat mode for normal chat messages.
    usage: "Usage: /togglestaffchat"
    permission: ezchat.staffchat.toggle
permissions:
  ezchat.reload:
    description: Allows use of /ezchat reload
    default: op
  ezchat.clearchat:
    description: Allows use of /ezchat clear
    default: op
  ezchat.debug:
    description: Allows use of /ezchat debug
    default: op
  ezchat.colorcodes:
    description: Allows color codes in chat messages
    default: false
  ezchat.rgbcodes:
    description: Allows RGB/hex color codes in chat messages
    default: false
  ezchat.chattoggle:
    description: Allows use of /togglechat
    default: true
  ezchat.msg:
    description: Allows use of /msg
    default: true
  ezchat.reply:
    description: Allows use of /reply
    default: true
  ezchat.togglemsg:
    description: Allows use of /togglemsg
    default: true
  ezchat.ignore:
    description: Allows use of /ignore
    default: true
  ezchat.mail:
    description: Allows use of /mail
    default: true
  ezchat.mail.inbox:
    description: Allows viewing /mail inbox
    default: true
  ezchat.mail.sent:
    description: Allows viewing /mail sent
    default: true
  ezchat.mail.received:
    description: Allows viewing /mail received
    default: true
  ezchat.mail.unread:
    description: Allows viewing /mail unread
    default: true
  ezchat.togglemail:
    description: Allows use of /togglemail
    default: true

  ezchat.bypass.advertising:
    description: Bypass anti-advertising moderation checks
    default: op

  ezchat.logs:
    description: Allows use of /ezchat logs
    default: op
  ezchat.mute:
    description: Allows use of /ezchat mute
    default: op
  ezchat.mutetemp:
    description: Allows use of /ezchat mutetemp
    default: op

  ezchat.servermsg.toggle:
    description: Allows use of /toggleservermsg
    default: true
  ezchat.deathmsg.toggle:
    description: Allows use of /toggledeathmsg
    default: true
  ezchat.broadcast:
    description: Allows use of /ezchat broadcast as a player
    default: op

  ezchat.staffchat:
    description: Allows sending and receiving staff chat.
    default: op
  ezchat.staffchat.toggle:
    description: Allows use of /togglestaffchat.
    default: op
  ezchat.staffalerts:
    description: Allows receiving staff alerts.
    default: op
  ezchat.staffalerts.send:
    description: Allows sending /ezchat staffalert as a player.
    default: op
