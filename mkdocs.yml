site_name: EzChat
site_description: Communication management plugin for Minecraft servers
site_author: EZInnovations
theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.footer
    - content.code.copy
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Commands: commands.md
  - Configuration: configuration.md
  - Logging: logging.md
  - Mute System: mute-system.md
  - Anti-Flood: anti-flood.md
  - Permissions: permissions.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
