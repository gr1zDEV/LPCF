site_name: EzChat
site_description: Communication management plugin for Minecraft servers
site_author: EZInnovations
repo_url: https://github.com/<username>/EzChat

theme:
  name: material
  palette:
    scheme: slate
    primary: indigo
    accent: indigo
  features:
    - navigation.sections
    - navigation.expand
    - navigation.footer

nav:
  - Home: index.md
  - Installation: installation.md
  - Commands: commands.md
  - Configuration: configuration.md
  - Logging: logging.md
  - Mute System: mute-system.md
  - Permissions: permissions.md

markdown_extensions:
  - admonition
  - codehilite
  - toc:
      permalink: true
